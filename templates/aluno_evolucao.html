{% extends 'base.html' %}{% from 'components.html' import mobile_nav %}
{% block body %}
<main class="mobile-app"><header class="mobile-header"><a href="{{ url_for('aluno_dashboard') }}"><i data-lucide="arrow-left"></i></a><h1>Evolução</h1><i data-lucide="more-vertical"></i></header>
<div class="tabs"><button class="active">Peso</button><button>Medidas</button><button>Fotos</button></div>
<article class="panel mobile-panel"><h2>Peso (kg)</h2><canvas id="evolucaoFullChart"></canvas><div class="metric-row"><div><span>Peso atual</span><strong>{{ aluno.peso }} kg</strong></div><div><span>Meta</span><strong class="green">{{ aluno.meta }} kg</strong></div></div><p class="progress-copy">Faltam {{ '%.1f'|format(aluno.peso - aluno.meta) }} kg para sua meta!</p><div class="progress"><div class="progress-bar" style="width:64%"></div></div></article>{{ mobile_nav('evolucao') }}</main>
{% endblock %}
